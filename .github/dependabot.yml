version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "@vitejs/*"
          - "@testing-library/*"
          - "typescript"
          - "vitest"
          - "vite"
      build-tools:
        patterns:
          - "tsup"
          - "@size-limit/*"
          - "size-limit"
          - "@biomejs/*"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    reviewers:
      - "ezitounioussama"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "security"
